services:
  - type: web
    name: recruitment-screener
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: GROQ_API_KEY
        sync: false
      - key: EMPLOYER_EMAIL
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: COMPANY_NAME
        sync: false
      - key: APPWRITE_ENDPOINT
        sync: false
      - key: APPWRITE_PROJECT_ID
        sync: false
      - key: APPWRITE_API_KEY
        sync: false
      - key: APPWRITE_DATABASE_ID
        sync: false
      - key: APPWRITE_CANDIDATES_COLLECTION_ID
        sync: false
      - key: APPWRITE_JOBS_COLLECTION_ID
        sync: false
      - key: APPWRITE_CHATS_COLLECTION_ID
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_CHANNEL_ID
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GOOGLE_SEARCH_API_KEY
        sync: false
      - key: GOOGLE_SEARCH_CX
        sync: false
      - key: GOOGLE_CLIENT_EMAIL
        sync: false
      - key: GOOGLE_PRIVATE_KEY
        sync: false
      - key: PORT
        value: 10000